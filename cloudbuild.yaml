steps:
  # Step 1: Build the image using the Dockerfile inside the Scripts folder
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/hello-python-docker', 
      'Scripts/'
    ]

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hello-python-docker']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'hello-python-docker-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/hello-python-docker'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/hello-python-docker'